name: Bump Themes

on:
  # push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Setup Hugo
        run: |
          HUGO_VERSION=$(curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
      - name: bump themes
        run: |
          hugo mod get -u
          hugo mod tidy
      - uses: stefanzweifel/git-auto-commit-action@v7
        id: auto-commit-action
        with:
          commit_message: 'chore: update themes'
      - name: Deploy if changed
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: gh workflow run vercel.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
